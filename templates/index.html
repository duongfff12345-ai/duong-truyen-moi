<script>
async function createAudio() {
    const btn = document.getElementById('mainBtn');
    const loadingIcon = document.getElementById('loadingIcon');
    const btnText = document.getElementById('btnText');

    const text = document.getElementById('text').value;
    if(!text.trim()) return alert("Văn bản trống!");

    btn.disabled = true;
    loadingIcon.classList.remove('hidden');
    btnText.innerText = "ĐANG XỬ LÝ...";

    const fd = new FormData();
    fd.append('text', text);
    fd.append('voice', document.getElementById('voice').value);
    fd.append('speed', document.getElementById('speed').value);

    try {
        const res = await fetch('/generate', { method: 'POST', body: fd });

        let data;
        try {
            data = await res.json();
        } catch {
            const textErr = await res.text();
            throw new Error("Server lỗi (trả HTML): " + textErr);
        }

        if(data.audio_url) {
            document.getElementById('audioElement').src = data.audio_url + "?v=" + Date.now();
            document.getElementById('dlLink').href = data.audio_url;
            document.getElementById('playerCard').classList.remove('hidden');
        } else {
            throw new Error(data.error);
        }

    } catch (e) {
        alert("Lỗi: " + e.message);
    } finally {
        btn.disabled = false;
        loadingIcon.classList.add('hidden');
        btnText.innerText = "CHUYỂN ĐỔI";
    }
}
</script>
